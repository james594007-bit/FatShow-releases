<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>FatShow 下載</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif; text-align: center; padding: 60px 20px; background: #1a1a1a; color: #e0e0e0; margin: 0; }
  h1 { font-size: 22px; margin: 0 0 12px; }
  .detected { color: #00bcd4; font-size: 14px; margin-bottom: 30px; }
  .spinner { border: 3px solid #333; border-top-color: #00bcd4; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; margin: 20px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { color: #999; line-height: 1.8; font-size: 13px; }
  #manual { display: none; margin-top: 30px; padding: 20px; background: #2a2a2a; border-radius: 8px; max-width: 400px; margin-left: auto; margin-right: auto; }
  a { color: #00bcd4; text-decoration: none; margin: 0 10px; }
  a:hover { text-decoration: underline; }
  .check { color: #00bcd4; font-size: 14px; letter-spacing: 2px; margin: 10px auto 20px; line-height: 1; }
  .retry-btn { display: inline-block; margin-top: 16px; padding: 8px 18px; background: transparent; color: #00bcd4; border: 1px solid #00bcd4; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .retry-btn:hover { background: #00bcd4; color: #1a1a1a; }

  /* ===== email gate 彈窗（DaVinci 風）===== */
  #gate-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.82); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 1000; }
  .gate-card { max-width: 440px; width: 100%; box-sizing: border-box; background: #2a2a2a; border-radius: 12px; padding: 36px 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .gate-card h2 { font-size: 21px; margin: 0 0 16px; line-height: 1.4; color: #e0e0e0; }
  .gate-card .desc { color: #b0b0b0; line-height: 1.9; font-size: 14px; margin: 0 0 24px; }
  .gate-card input[type="email"] { width: 100%; box-sizing: border-box; padding: 12px 14px; font-size: 15px; border: 1px solid #444; border-radius: 8px; background: #1a1a1a; color: #e0e0e0; outline: none; }
  .gate-card input[type="email"]:focus { border-color: #00bcd4; }
  .gate-card .err { color: #ff6b6b; font-size: 13px; min-height: 18px; margin: 8px 0 0; text-align: left; }
  .gate-card button { width: 100%; margin-top: 12px; padding: 13px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; background: #00bcd4; color: #1a1a1a; cursor: pointer; }
  .gate-card button:hover { background: #00d4ef; }
  .gate-card button:disabled { opacity: 0.6; cursor: default; }
  .gate-card .trust { color: #888; font-size: 12px; line-height: 1.7; margin: 18px 0 0; }
</style>
</head>
<body>

<!-- ===== email gate 彈窗 ===== -->
<div id="gate-overlay">
  <div class="gate-card">
    <h2>下載 FatShow 前,先留個信箱</h2>
    <p class="desc">
      留下 email 就能進下載頁。<br>
      之後新功能、新版更新上線,我也會第一時間通知你 ——<br>
      信箱只用來寄 FatShow 的更新,不塞廣告、隨時可退訂。
    </p>
    <form id="gate-form" novalidate>
      <input type="email" id="gate-email" placeholder="your@email.com" autocomplete="email" required>
      <p class="err" id="gate-err"></p>
      <button type="submit" id="gate-submit">前往下載頁面</button>
    </form>
    <p class="trust">FatShow 是 Mac 螢幕示範與錄影工具,免費永久試用、不用填信用卡。</p>
  </div>
</div>

<!-- ===== 下載中畫面（gate 通過後才動）===== -->
<h1 id="title">FatShow 下載中...</h1>
<p class="detected" id="detected">正在準備下載</p>
<div id="check" class="check" style="display:none;">— DOWNLOAD STARTED —</div>
<div id="spinner" class="spinner" style="display:none;"></div>
<p id="hint">如果沒有自動開始下載,請稍候幾秒,或點下方手動下載。</p>
<div id="manual">
  <p style="margin-top:0;" id="manual-title">手動下載:</p>
  <a id="mac-link" href="#">下載 FatShow.dmg（macOS）</a>
  <a href="https://fathub.tw/fatshow/">官方網站</a>
  <div><span class="retry-btn" id="retry-btn" style="display:none;">重新下載</span></div>
</div>

<script>
// ===== CONFIG（James 建好「FatShow 下載名單」Google 表單後填這兩個值）=====
// 1) FORM_ACTION：表單的 formResponse 端點（FatShow 下載名單,2026-07-03 接好）
const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSekZ5QlKUwJBlQDndeJLyFaJiH_1jUaYLV9oO2JQaJDrFrMVg/formResponse';
// 2) EMAIL_ENTRY：Email 那一題的 entry ID
const EMAIL_ENTRY = 'entry.2042206199';
// 同瀏覽器填過一次就記住、之後不再擋（減少老客戶重複下載的摩擦）。不想記住改成 false
const REMEMBER = true;
// =====================================================

// FatShow 只有 macOS 版
const MAC_URL = 'https://github.com/james594007-bit/FatShow-releases/releases/latest/download/FatShow.dmg';
const FALLBACK = 'https://fathub.tw/fatshow/';

const ua = navigator.userAgent;
const platform = navigator.platform || '';
const isMac = /Mac|iPhone|iPad|iPod/.test(ua) || /Mac/.test(platform);

document.getElementById('detected').textContent =
  isMac ? '偵測到 macOS,正在下載 FatShow' : 'FatShow 目前只有 macOS 版 —— 仍可下載 dmg 備用';
document.getElementById('mac-link').href = MAC_URL;

function triggerDownload() {
  const a = document.createElement('a');
  a.href = MAC_URL;
  a.rel = 'noopener';
  a.download = '';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// gate 通過後才跑的下載流程
function startDownload() {
  document.getElementById('spinner').style.display = 'block';
  setTimeout(triggerDownload, 600);
  setTimeout(() => {
    document.getElementById('title').textContent = '下載已開始';
    document.getElementById('detected').textContent = '請查看瀏覽器下載列 / Downloads 資料夾';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('check').style.display = 'block';
    document.getElementById('hint').innerHTML = '檔案正在下載中,完成後可關閉此頁面。<br>若沒看到下載開始,請從下方手動下載或點「重新下載」。';
    document.getElementById('manual').style.display = 'block';
    document.getElementById('manual-title').textContent = '其他選項:';
    const retry = document.getElementById('retry-btn');
    retry.style.display = 'inline-block';
    retry.onclick = triggerDownload;
  }, 1500);
}

function passGate() {
  document.getElementById('gate-overlay').style.display = 'none';
  startDownload();
}

// ===== gate 邏輯 =====
const gateForm = document.getElementById('gate-form');
const emailInput = document.getElementById('gate-email');
const errEl = document.getElementById('gate-err');
const btn = document.getElementById('gate-submit');

function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
function formReady() { return FORM_ACTION.indexOf('PLACEHOLDER') === -1 && EMAIL_ENTRY.indexOf('PLACEHOLDER') === -1; }

// 已填過 → 直接下載,不再擋
if (REMEMBER && localStorage.getItem('fatshow_email_submitted') === '1') {
  passGate();
} else {
  emailInput.focus();
  gateForm.addEventListener('submit', function (e) {
    e.preventDefault();
    const email = emailInput.value.trim();
    errEl.textContent = '';
    if (!email) { errEl.textContent = '請先填 email'; return; }
    if (!isValidEmail(email)) { errEl.textContent = 'email 格式看起來不太對,再確認一下'; return; }

    btn.disabled = true;
    btn.textContent = '前往下載頁…';

    const done = (function () { let c = false; return function () { if (c) return; c = true; if (REMEMBER) { try { localStorage.setItem('fatshow_email_submitted', '1'); } catch (e) {} } passGate(); }; })();
    setTimeout(done, 1200); // 保險:網路慢或表單未接也一定放行,不擋下載

    if (formReady()) {
      const body = new URLSearchParams();
      body.append(EMAIL_ENTRY, email);
      fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body }).then(done).catch(done);
    } else {
      done();  // 表單還沒接上:先放行,email 暫不記錄(接上後即開始收集)
    }
  });
}
</script>
</body>
</html>
